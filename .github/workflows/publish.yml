name: Render and publish book

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress one finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Reads Imports/Remotes from DESCRIPTION; pak resolves any
          # system libraries automatically.
          cache-version: 1

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Render book
        # Uses committed _freeze cache; only changed chapters re-execute.
        run: quarto render
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle data for download
        # Ships the example data alongside the book so readers can grab the
        # exact data for this build at <site>/data.zip.
        run: zip -r docs/data.zip data

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
